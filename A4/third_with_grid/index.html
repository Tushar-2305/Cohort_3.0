<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&family=Exo:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <title>Portfolio_Tushar_Chavan</title>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <p>Podcasts</p>
        <p>Portfolio</p>
        <p>Research</p>
        <p>Clients</p>
      </div>
      <div class="profile">
        <div class="about">
          <div class="text">
            <i class="fa-solid fa-circle-notch"></i>
            <h1>About Me</h1>
          </div>
          <div class="wrap"></div>
        </div>
        <div class="content">
          <div class="photo">
            <img
              src="Picsart_26-05-17_12-23-46-248.png"
              alt="Profile Picture"
            />
            <div class="bg_circle">
              <div class="inner_circle"></div>
            </div>
          </div>
          <div class="name">
            <h1>Im,</h1>
            <h2>Tushar</h2>
            <h2>Chavan</h2>
            <p>
              tusharchavan0523@gmail.com <i class="fa-regular fa-envelope"></i>
            </p>
          </div>
          <div class="stage">
            <div class="badge">
              <svg class="badge__text" viewBox="0 0 200 200">
                <defs>
                  <path
                    id="circlePath"
                    d="M 100,100 m -78,0 a 78,78 0 1,1 156,0 a 78,78 0 1,1 -156,0"
                  />
                </defs>
                <text>
                  <textPath href="#circlePath" startOffset="0">
                    MY DESIGN PORTFOLIO • 2025 •
                  </textPath>
                </text>
              </svg>
              <div class="badge__lens"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="title">
        <div class="title_text">
          <h1>Portfolio</h1>
          <i class="fa-solid fa-angle-right"></i>
        </div>
      </div>
      <div class="stat_vid">
        <div class="video">
          <img src="Screenshot 2026-05-27 at 6.15.00 AM.png" alt="bg_Image" />
        </div>
      </div>
      <div class="stat_box">
        <div class="stat1">
          <div class="stat_text">
            <h1>256</h1>
            <p>Projects</p>
          </div>
        </div>
        <div class="stat2">
          <div class="stat_text">
            <h1>156</h1>
            <p>Awards</p>
          </div>
        </div>
      </div>
      <div class="client">
        <div class="client_list">
          <div class="apple">
            <i class="fa-brands fa-apple"></i>
            <p>Clients</p>
          </div>
        </div>
      </div>
      <div class="awards">
        <div class="number"><h1>172</h1></div>
        <div class="text">
          <p>Global Design</p>
          <p>Awards</p>
        </div>
      </div>
    </div>
  </body>
</html>
