<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Pokemon Cards</title>
  </head>
  <body>
    <navbar>
      <div class="menu">
        <i class="ri-menu-line"></i>
      </div>
      <div class="logo">
        <img src="pokemon.webp" />
      </div>
      <div class="mode">
        <i class="ri-sun-fill"></i>
      </div>
    </navbar>
    <search>
      <div class="search">
        <i class="ri-search-line"></i>
        <input type="text" placeholder="       Search for a Pokemon..." />
      </div>
      <div class="filter">
        <div class="types">
          <h1>Filter by types (1)</h1>
          <i class="ri-arrow-drop-down-line"></i>
        </div>
        <div class="arrow">
          <i class="ri-arrow-down-long-fill"></i>
        </div>
      </div>
    </search>
    <main>
      <div class="card">
        <p>#0908</p>
        <div class="char">
            <img src="unnamed.webp" alt="">
        </div>
        <img src="Meowscarada.1024.3874991.webp" />
        <div class="bg"></div>
        <h1>Meowscarada</h1>
        <div class="type_info">
          <img src="unnamed.webp" />
          <p>Grass</p>
        </div>
        <div class="more">
          <i class="ri-arrow-right-long-line"></i>
        </div>
      </div>
      <div class="card card2">
        <p>#0624</p>
        <div class="char">
            <img src="settings-gear-solid-icon-for-web-dashboard-vector-removebg-preview.png" alt="">
        </div>
        <img src="0624_Shiny_Pawniard.webp" alt="" srcset="">
        <div class="bg"></div>
        <h1>Pawniard</h1>
        <div class="type_info">
          <img src="settings-gear-solid-icon-for-web-dashboard-vector-removebg-preview.png" />
          <p>Dark/Steel</p>
        </div>
        <div class="more">
          <i class="ri-arrow-right-long-line"></i>
        </div>
      </div>
      <div class="card card3">
        <p>#0229</p>
        <div class="char">
            <img src="360_F_338928104_6b4Nhr5PxIIVc1RxB8zCP9YWw8kgqnEm-removebg-preview.png" alt="">
        </div>
        <img src="Houndoom-Pokemon-No-Background-Clip-Art.webp" />
        <div class="bg"></div>
        <h1>Houndoom</h1>
        <div class="type_info">
          <img src="360_F_338928104_6b4Nhr5PxIIVc1RxB8zCP9YWw8kgqnEm-removebg-preview.png" />
          <p>Fire/Dark</p>
        </div>
        <div class="more">
          <i class="ri-arrow-right-long-line"></i>
        </div>
      </div>
      <div class="card card4">
        <p>#0686</p>
        <div class="char">
            <img src="water-droplet-icon-free-vector.jpg" alt="">
        </div>
        <img src="Meowscarada.1024.3874991.webp" />
        <div class="bg"></div>
        <h1>Meowscarada</h1>
        <div class="type_info">
          <img src="unnamed.webp" />
          <p>Grass</p>
        </div>
        <div class="more">
          <i class="ri-arrow-right-long-line"></i>
        </div>
      </div>
    </main>
  </body>
</html>
